<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f1a" />
  <meta name="description" content="AIの概念から実務まで学べるモバイル教科書。週次で最新情報を自動更新。" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AI教科書" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
  <title>AI教科書</title>
</head>
<body>
  <header class="app-header">
    <button class="icon-btn menu-btn" id="menuBtn" aria-label="メニュー">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M3 6h18v2H3zM3 11h18v2H3zM3 16h18v2H3z"/></svg>
    </button>
    <div class="app-title">
      <span class="app-title-main">AI教科書</span>
      <span class="app-title-sub" id="chapterIndicator">はじめに</span>
    </div>
    <button class="icon-btn theme-btn" id="themeBtn" aria-label="テーマ切替">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.5 5.5 0 0 1-7.54-7.54C12.92 3.04 12.46 3 12 3z"/></svg>
    </button>
  </header>

  <nav class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-inner">
      <div class="drawer-head">
        <div class="drawer-title">目次</div>
        <button class="icon-btn" id="closeDrawer" aria-label="閉じる">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M18.3 5.71L12 12.01l-6.3-6.3-1.4 1.41L10.6 13.4l-6.3 6.3 1.4 1.41L12 14.82l6.3 6.3 1.4-1.41-6.3-6.3 6.3-6.3z"/></svg>
        </button>
      </div>
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="キーワード検索（例：RAG、API、SaaS）" />
      </div>
      <ul class="chapter-list" id="chapterList"></ul>
      <div class="drawer-foot">
        <div class="progress-wrap">
          <div class="progress-label">読了進捗</div>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-text" id="progressText">0 / 0</div>
        </div>
        <button class="text-btn" id="resetProgressBtn">進捗をリセット</button>
      </div>
    </div>
    <div class="drawer-scrim" id="drawerScrim"></div>
  </nav>

  <main class="content" id="content">
    <div class="loading" id="loading">読み込み中…</div>
  </main>

  <div class="bottom-bar">
    <button class="nav-btn" id="prevBtn">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.4 7.41L14 6l-6 6 6 6 1.4-1.41L10.83 12z"/></svg>
      前へ
    </button>
    <button class="nav-btn mark-btn" id="markBtn">読了</button>
    <button class="nav-btn" id="nextBtn">
      次へ
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M8.6 16.59L13.17 12 8.6 7.41 10 6l6 6-6 6z"/></svg>
    </button>
  </div>

  <footer class="app-footer" id="appFooter">
    <span id="updatedAt">最終更新: -</span>
    <span class="sep">·</span>
    <span id="version">v1.0</span>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
